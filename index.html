<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content.ZVD — Презентация</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700;900&family=Onest:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f5f2ec;
    --gold: #c8a84b;
    --gold-light: #e8c96a;
    --gold-dim: rgba(200,168,75,0.15);
    --red: #e03e2d;
    --text-dim: rgba(245,242,236,0.45);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Onest', sans-serif;
    overflow-x: hidden;
    cursor: default;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.5;
  }

  /* NAVIGATION */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 24px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to bottom, rgba(10,10,10,0.95), transparent);
  }

  .nav-logo {
    font-family: 'Unbounded', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.05em;
    color: var(--gold);
  }

  .nav-logo span { color: var(--white); }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--gold); }

  /* SLIDES */
  .slide {
    min-height: 100vh;
    position: relative;
    display: flex;
    align-items: center;
    padding: 120px 48px 80px;
    overflow: hidden;
  }

  .slide-inner {
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }
